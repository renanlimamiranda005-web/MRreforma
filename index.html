<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>WebView</title>

  <style>
    :root {
      --vh: 1vh;
      --safeTop: env(safe-area-inset-top);
      --safeBottom: env(safe-area-inset-bottom);
      --safeLeft: env(safe-area-inset-left);
      --safeRight: env(safe-area-inset-right);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: calc(var(--vh) * 100);
      overflow: hidden;
      background: #0b0b0f;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1d1d27 0%, #0b0b0f 45%, #050507 100%);
      color: #ffffff;
      transition: opacity 0.35s ease, visibility 0.35s ease;
      padding: calc(20px + var(--safeTop)) calc(20px + var(--safeRight)) calc(20px + var(--safeBottom)) calc(20px + var(--safeLeft));
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin-bottom: 18px;
    }

    .loading-text {
      font-size: 15px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
      opacity: 0.9;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .fallback {
      display: none;
      max-width: 360px;
      margin-top: 18px;
      text-align: center;
      color: rgba(255,255,255,.78);
      font-size: 13px;
      line-height: 1.45;
    }

    .fallback a {
      display: inline-flex;
      margin-top: 12px;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 16px;
      background: #ffffff;
      color: #0b0b0f;
      font-weight: 800;
      text-decoration: none;
    }

    #loader.erro .fallback { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      height: calc(var(--vh) * 100);
      border: none;
      background: #ffffff;
      display: block;
    }
  </style>
</head>

<body>
  <div id="loader">
    <div class="spinner"></div>
    <div class="loading-text">carregando</div>
    <div class="fallback">
      Se a tela não abrir no GitHub Pages, o Apps Script precisa permitir iframe no arquivo .gs.
      <a id="abrirDireto" href="#" target="_self" rel="noopener">abrir direto</a>
    </div>
  </div>

  <iframe
    id="appFrame"
    title="Aplicativo"
    allowfullscreen
    allow="camera; microphone; clipboard-read; clipboard-write; fullscreen; geolocation"
    referrerpolicy="no-referrer-when-downgrade"
  ></iframe>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyIYx7OzCz3NOJwJa8HgGj46LQUw0MEBZgf4TFJ8ATatwHRUyBXdGBBTCkj7I_88zD2/exec";

    const iframe = document.getElementById("appFrame");
    const loader = document.getElementById("loader");
    const abrirDireto = document.getElementById("abrirDireto");

    function atualizarAltura() {
      const altura = (window.visualViewport && window.visualViewport.height) || window.innerHeight || document.documentElement.clientHeight;
      document.documentElement.style.setProperty("--vh", (altura * 0.01) + "px");
    }

    atualizarAltura();
    window.addEventListener("resize", atualizarAltura, { passive: true });
    window.addEventListener("orientationchange", () => setTimeout(atualizarAltura, 250), { passive: true });
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", atualizarAltura, { passive: true });
      window.visualViewport.addEventListener("scroll", atualizarAltura, { passive: true });
    }

    const url = new URL(APP_URL);
    url.searchParams.set("wv", "1");
    url.searchParams.set("embedded", "1");

    iframe.src = url.toString();
    abrirDireto.href = url.toString();

    iframe.onload = () => {
      setTimeout(() => loader.classList.add("hidden"), 450);
    };

    setTimeout(() => {
      if (!loader.classList.contains("hidden")) {
        loader.classList.add("erro");
      }
    }, 7000);
  </script>
</body>
</html>
